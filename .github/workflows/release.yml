name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-android:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Get dependencies
        run: flutter pub get

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Build APK (split per ABI)
        run: |
          flutter build apk --release \
            --split-per-abi \
            --dart-define=APP_VERSION=${{ github.ref_name }} \
            --dart-define=DEVELOPER="Mohamed Sherif"

      - name: Build AAB (Play Store)
        run: |
          flutter build appbundle --release \
            --dart-define=APP_VERSION=${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true
          body: |
            ## Macro Camera ${{ github.ref_name }}

            **Developer:** Mohamed Sherif

            ### Downloads
            - **APK (arm64):** `app-arm64-v8a-release.apk` — للأجهزة الحديثة (64-bit)
            - **APK (arm32):** `app-armeabi-v7a-release.apk` — للأجهزة القديمة (32-bit)
            - **AAB (Play Store):** `app-release.aab` — لرفعها على Google Play

            ### Dedication
            تم اهداء هذا التطبيق من محمد شريف الي نعمة عبد الله ❤️
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

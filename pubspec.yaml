name: macro_app
description: "Macro Camera - Professional camera and video project management app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Camera
  camerawesome: ^2.1.0

  # Video Processing
  ffmpeg_kit_flutter: ^6.0.3

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Preferences
  shared_preferences: ^2.3.2

  # Data Classes
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Functional Programming
  dartz: ^0.10.1

  # UUID
  uuid: ^4.5.0

  # File/Path
  path_provider: ^2.1.4
  path: ^1.9.0
  cross_file: ^0.3.4+2

  # Media
  video_player: ^2.9.1
  chewie: ^1.8.1

  # Permissions
  permission_handler: ^11.3.1

  # UI Utilities
  flutter_slidable: ^3.1.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.0

  # Formatting
  intl: ^0.19.0

  # Share
  share_plus: ^10.0.2

  # Logging
  logger: ^2.4.0

  # Device
  device_info_plus: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  isar_generator: ^3.1.0+1
  riverpod_generator: ^2.4.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
